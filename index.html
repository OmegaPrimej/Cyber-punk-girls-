<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BCI · MATRIX + SEAMLESS LOOP ENGINE</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }
    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b0c10;
      font-family: 'Courier New', monospace;
    }
    /* Layer 1: Fixed Background Video Engine */
    .video-bg-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
      overflow: hidden;
    }
    .video-bg-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.5; /* Slightly lowered to make overlays pop */
    }
    /* Layer 2: Transparent BCI Foreground Interface */
    #ui-container {
      position: absolute;
      top: 20px;
      left: 0;
      width: 100%;
      text-align: center;
      pointer-events: none;
      z-index: 10;
    }
    h1 {
      color: #66fcf1;
      font-size: 1.2rem;
      letter-spacing: 2px;
      text-shadow: 0 0 8px rgba(102,252,241,0.6);
      margin-bottom: 8px;
    }
    #status-box {
      display: inline-block;
      padding: 6px 12px;
      background: royalblue;
      color: white;
      font-size: 0.8rem;
      border-radius: 4px;
      pointer-events: auto;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(65, 105, 225, 0.5);
    }
    /* Layer 3: Cyberpunk HUD Overlays */
    .hud-overlay {
      position: absolute;
      z-index: 5;
      color: #66fcf1;
      font-size: 0.75rem;
      text-shadow: 0 0 5px rgba(102,252,241,0.5);
      background: rgba(11, 12, 16, 0.7);
      padding: 10px;
      border: 1px solid #1f2833;
      border-radius: 4px;
      pointer-events: none;
    }
    #hud-left {
      bottom: 20px;
      left: 20px;
      text-align: left;
    }
    #hud-right {
      bottom: 20px;
      right: 20px;
      text-align: right;
    }
    .glow-text {
      color: #ff4d6d;
      text-shadow: 0 0 5px #ff4d6d;
    }
  </style>
</head>
<body>

  <!-- Background Video Processing Layer -->
  <div class="video-bg-container">
    <video id="bgVideo" autoplay loop muted playsinline>
      <source src="https://github.com" type="video/mp4">
      Your browser does not support the video tag.
    </video>
  </div>

  <!-- HUD Overlays -->
  <div class="hud-overlay" id="hud-left">
    <div>SYS.LOC // TERMINAL_NODE_ALPHA</div>
    <div>MATRIX_CORE // ONLINE</div>
    <div id="fps-counter">FPS: --</div>
  </div>

  <div class="hud-overlay" id="hud-right">
    <div>SIGNAL // <span class="glow-text">SYNCED</span></div>
    <div id="timestamp-ui">UTC: --:--:--</div>
    <div>BUFFER_LOAD // 100%</div>
  </div>

  <!-- Interactive Interface Layer -->
  <div id="ui-container">
    <h1>🧠 BCI · FEEDBACK MATRIX + BACKGROUND ENGINE</h1>
    <div id="status-box" onclick="togglePlayback()">STATUS: LOOPING ACTIVE (TAP TO PAUSE)</div>
  </div>

<script>
  const video = document.getElementById("bgVideo");
  const statusBox = document.getElementById("status-box");
  const fpsCounter = document.getElementById("fps-counter");
  const timestampUi = document.getElementById("timestamp-ui");

  // INTERFACE EVENT COMMANDS
  function togglePlayback() {
    if (!video.paused) {
      video.pause();
      statusBox.style.background = "#ff4d6d";
      statusBox.innerText = "STATUS: ENGINE PAUSED (TAP TO RESUME)";
      statusBox.style.boxShadow = "0 0 10px #ff4d6d";
    } else {
      video.play().catch(err => console.log("Playback interrupted:", err));
      statusBox.style.background = "royalblue";
      statusBox.innerText = "STATUS: LOOPING ACTIVE (TAP TO PAUSE)";
      statusBox.style.boxShadow = "0 0 10px rgba(65, 105, 225, 0.5)";
    }
  }

  // HUD METRICS SIMULATION
  let lastCalledTime;
  let fps;
  function updateHudMetrics() {
    // Live clock
    const now = new Date();
    timestampUi.innerText = `SYS_TIME // ${now.toISOString().slice(11, 19)}`;

    // Simple display frame loop calculations
    if(!lastCalledTime) {
       lastCalledTime = performance.now();
       fps = 0;
    } else {
       let delta = (performance.now() - lastCalledTime)/1000;
       lastCalledTime = performance.now();
       fps = Math.round(1/delta);
       fpsCounter.innerText = `SYSTEM_PERF // ${fps} FPS`;
    }
    requestAnimationFrame(updateHudMetrics);
  }
  requestAnimationFrame(updateHudMetrics);

  // BACKGROUND WAKE/RECOVERY ANCHOR
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible" && statusBox.innerText.includes("ACTIVE")) {
      video.play().catch(err => console.log("Recovery playback failed:", err));
    }
  });
</script>
</body>
</html>
