<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BCI · MATRIX + SEAMLESS LOOP ENGINE</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }
    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b0c10;
      font-family: 'Courier New', monospace;
    }
    /* Layer 1: Background Canvas Loop Engine */
    #loopCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
    }
    /* Layer 2: Transparent BCI Foreground Interface */
    #ui-container {
      position: absolute;
      top: 20px;
      left: 0;
      width: 100%;
      text-align: center;
      pointer-events: none;
      z-index: 10;
    }
    h1 {
      color: #66fcf1;
      font-size: 1.2rem;
      letter-spacing: 2px;
      text-shadow: 0 0 8px rgba(102,252,241,0.6);
      margin-bottom: 8px;
    }
    #status-box {
      display: inline-block;
      padding: 6px 12px;
      background: royalblue;
      color: white;
      font-size: 0.8rem;
      border-radius: 4px;
      pointer-events: auto;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Background Processing Layer -->
  <canvas id="loopCanvas"></canvas>

  <!-- Interactive Interface Layer -->
  <div id="ui-container">
    <h1>🧠 BCI · FEEDBACK MATRIX + BACKGROUND ENGINE</h1>
    <div id="status-box" onclick="togglePlayback()">STATUS: LOOPING ACTIVE (TAP TO PAUSE)</div>
  </div>

<script>
  /**
   * @title HIGH-PERFORMANCE SEQUENTIAL IMAGE LOOP ENGINE
   * Engineered for background persistence on low-tier web runtimes and mobile systems.
   */

  const canvas = document.getElementById("loopCanvas");
  const ctx = canvas.getContext("2d");
  const statusBox = document.getElementById("status-box");

  // 1. CONFIGURATION ARRAY: Replace these strings with your actual image paths or GitHub URLs
  const imageSources = [
    "frame1.jpg",
    "frame2.jpg",
    "frame3.jpg",
    "frame4.jpg"
  ];

  const images = [];
  let currentFrameIndex = 0;
  let isPlaying = true;
  let lastFrameTime = 0;
  
  // Set target loop performance (e.g., 100ms per frame update = 10 FPS)
  const frameInterval = 100; 

  // 2. STAGE RESPONSIVENESS HASH
  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    renderCurrentFrame(); // Immediate re-draw step to avoid flashing
  }
  window.addEventListener("resize", resizeCanvas);

  // 3. ASYNCHRONOUS PRE-LOADER
  function preloadImages() {
    let loadedCount = 0;
    statusBox.innerText = `STATUS: LOADING IMAGES (0/${imageSources.length})`;

    imageSources.forEach((src, idx) => {
      const img = new Image();
      img.src = src;
      img.onload = () => {
        loadedCount++;
        images[idx] = img;
        
        if (loadedCount === imageSources.length) {
          resizeCanvas();
          statusBox.innerText = "STATUS: LOOPING ACTIVE (TAP TO PAUSE)";
          requestAnimationFrame(loopEngine);
        }
      };
      img.onerror = () => {
        console.error(`Failed to load asset at path: ${src}`);
      };
    });
  }

  // 4. RENDERING & COALESCING PIPELINE
  function renderCurrentFrame() {
    if (!images[currentFrameIndex]) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const img = images[currentFrameIndex];
    
    // Scale optimization: Covers screen proportionally without distorting proportions
    const canvasRatio = canvas.width / canvas.height;
    const imgRatio = img.width / img.height;
    
    let drawWidth, drawHeight, offsetX, offsetY;

    if (canvasRatio > imgRatio) {
      drawWidth = canvas.width;
      drawHeight = canvas.width / imgRatio;
      offsetX = 0;
      offsetY = (canvas.height - drawHeight) / 2;
    } else {
      drawWidth = canvas.height * imgRatio;
      drawHeight = canvas.height;
      offsetX = (canvas.width - drawWidth) / 2;
      offsetY = 0;
    }

    ctx.drawImage(img, offsetX, offsetY, drawWidth, drawHeight);
  }

  // 5. MAIN CORE TICK TIME ENGINE
  function loopEngine(timestamp) {
    if (!isPlaying) return;

    if (!lastFrameTime) lastFrameTime = timestamp;
    const elapsed = timestamp - lastFrameTime;

    if (elapsed >= frameInterval) {
      currentFrameIndex = (currentFrameIndex + 1) % images.length;
      renderCurrentFrame();
      lastFrameTime = timestamp;
    }

    requestAnimationFrame(loopEngine);
  }

  // 6. INTERFACE EVENT COMMANDS
  function togglePlayback() {
    isPlaying = !isPlaying;
    if (isPlaying) {
      statusBox.style.background = "royalblue";
      statusBox.innerText = "STATUS: LOOPING ACTIVE (TAP TO PAUSE)";
      lastFrameTime = 0; // Reset tick delta tracking
      requestAnimationFrame(loopEngine);
    } else {
      statusBox.style.background = "#ff4d6d";
      statusBox.innerText = "STATUS: ENGINE PAUSED (TAP TO RESUME)";
    }
  }

  // 7. BACKGROUND WAKE/RECOVERY ANCHOR
  // Prevents your mini projector or background processing tabs from locking the engine loop
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible") {
      if (isPlaying) {
        lastFrameTime = 0; 
        requestAnimationFrame(loopEngine);
      }
    }
  });

  // EXECUTE ON BOOT
  preloadImages();

</script>
</body>
</html>
