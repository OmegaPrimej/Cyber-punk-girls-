<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BCI · MATRIX + SEAMLESS LOOP ENGINE</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }
    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b0c10;
      font-family: 'Courier New', monospace;
    }
    /* Layer 1: Fixed Background Video Engine */
    .video-bg-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
      overflow: hidden;
    }
    .video-bg-container video {
      width: 100%;
      height: 100%;
      object-fit: cover; /* Proportional full screen scaling */
    }
    /* Layer 2: Transparent BCI Foreground Interface */
    #ui-container {
      position: absolute;
      top: 20px;
      left: 0;
      width: 100%;
      text-align: center;
      pointer-events: none;
      z-index: 10;
    }
    h1 {
      color: #66fcf1;
      font-size: 1.2rem;
      letter-spacing: 2px;
      text-shadow: 0 0 8px rgba(102,252,241,0.6);
      margin-bottom: 8px;
    }
    #status-box {
      display: inline-block;
      padding: 6px 12px;
      background: royalblue;
      color: white;
      font-size: 0.8rem;
      border-radius: 4px;
      pointer-events: auto;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Background Video Processing Layer -->
  <div class="video-bg-container">
    <!-- Autoplay, loop, muted, and playsinline are required for background execution -->
    <video id="bgVideo" autoplay loop muted playsinline>
      <!-- Perfected URL path referencing your GitHub repo file -->
      <source src="https://github.com" type="video/mp4">
      Your browser does not support the video tag.
    </video>
  </div>

  <!-- Interactive Interface Layer -->
  <div id="ui-container">
    <h1>🧠 BCI · FEEDBACK MATRIX + BACKGROUND ENGINE</h1>
    <div id="status-box" onclick="togglePlayback()">STATUS: LOOPING ACTIVE (TAP TO PAUSE)</div>
  </div>

<script>
  /**
   * @title NATIVE MP4 VIDEO STREAMING LOOP ENGINE
   * Refactored from canvas frames to native video hardware acceleration.
   */
  const video = document.getElementById("bgVideo");
  const statusBox = document.getElementById("status-box");

  // INTERFACE EVENT COMMANDS
  function togglePlayback() {
    if (!video.paused) {
      video.pause();
      statusBox.style.background = "#ff4d6d";
      statusBox.innerText = "STATUS: ENGINE PAUSED (TAP TO RESUME)";
    } else {
      video.play().catch(err => console.log("Playback interrupted:", err));
      statusBox.style.background = "royalblue";
      statusBox.innerText = "STATUS: LOOPING ACTIVE (TAP TO PAUSE)";
    }
  }

  // BACKGROUND WAKE/RECOVERY ANCHOR
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible" && statusBox.innerText.includes("ACTIVE")) {
      video.play().catch(err => console.log("Recovery playback failed:", err));
    }
  });
</script>
</body>
</html>
